spring:
  application:
    name: library-management

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 25

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml

  datasource:
    url: jdbc:postgresql://localhost:5432/library_management_db
    username: library_management_user
    password: ${LIBRARY_MANAGEMENT_APP_DB_PASSWORD}

member-loans-max-limit: 3