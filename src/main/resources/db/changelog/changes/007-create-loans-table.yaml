# 007-create-loans-table.yaml

databaseChangeLog:
  - changeSet:
      id: 007-create-loans-table
      author: Mahabbat Gozalov
      changes:
        - createTable:
            tableName: loans
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: book_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_loans_book
                    references: books(id)
              - column:
                  name: member_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_loans_member
                    references: members(id)
              - column:
                  name: loan_date
                  type: DATE
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: return_date
                  type: DATE