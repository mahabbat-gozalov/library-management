# 004-create-book-authors-table.yaml

databaseChangeLog:
  - changeSet:
      id: 004-create-book-authors-table
      author: Mahabbat Gozalov
      changes:
        - createTable:
            tableName: book_authors
            columns:
              - column:
                  name: book_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_book_authors_book
                    references: books(id)
              - column:
                  name: author_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_book_authors_author
                    references: authors(id)