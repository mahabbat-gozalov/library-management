# 005-create-book-categories-table.yaml

databaseChangeLog:
  - changeSet:
      id: 005-create-book-categories-table
      author: Mahabbat Gozalov
      changes:
        - createTable:
            tableName: book_categories
            columns:
              - column:
                  name: book_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_book_categories_book
                    references: books(id)
              - column:
                  name: category_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                    foreignKeyName: fk_book_categories_category
                    references: categories(id)